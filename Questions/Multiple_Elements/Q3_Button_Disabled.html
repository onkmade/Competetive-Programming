<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/output.css">
    <style>
        button{
            background-color: steelblue;
            color: white;
            padding: 0.5rem;
            border-radius: 0.35rem;
        }
    </style>
</head>

<!-- 
===================================================== 
Select all button elements inside a toolbar. 
Disable all buttons except the one that was just clicked.
===================================================== 
-->
<body class="p-4">

    <ul class="toolbar">
        <button id="btn-1" class="tool-btn cursor-pointer">Save</button>
        <button id="btn-2" class="tool-btn cursor-pointer">Edit</button>
        <button id="btn-3" class="tool-btn cursor-pointer">Move</button>
        <button id="btn-4" class="tool-btn cursor-pointer">Delete</button>
    </ul>

    <!-- Script Here -->
    <script>

        const list = document.querySelector('.toolbar');

        list.addEventListener('click', (e) => {
            const clickedBtn = e.target;

            if(!clickedBtn) return;
            
            const all = list.querySelectorAll('.tool-btn');

            all.forEach( btn => {
                if( btn !== clickedBtn){
                    btn.disabled = true;
                    btn.classList.remove('cursor-pointer');
                    btn.classList.add(
                        'opacity-50',
                        'cursor-not-allowed'
                    );
                }
            });
        });

    </script>
</body>
</html>
