<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.3 DOM Programming Level-1</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="mx-auto px-6">
    <h1 id="title">Understanding the DOM</h1>
    <p id="description">This is DOM Challenge, consist of 200 basic problems</p>
    <div id="counter"></div>
    <div id="greeting"></div>
    <div id="username-display"></div>
    <div id="status">Offline</div>
    <div id="price"></div>

    <div id="notification-count" class="flex space-x-1.5">
        <label for="nCount">Notification Count: </label>
        <p id="nCount">5</p>
    </div>

    <div id="error-message">Error Message</div>
    <div id="score"></div>

    <p id="welcome"></p>
    <div id="loading">Loading...</div>
    <div id="badge"></div>


    <!-- EVENT FUNDAMENTALS -->
    <button id="click-btn" class="cursor-pointer px-4 py-2 rounded bg-slate-800 text-white">Click</button>
    <button id="color-btn" class="cursor-pointer px-4 py-2 rounded bg-slate-800 text-white">Color</button>
    <div id="box" class="size-20 rounded-md m-3 border-2 border-slate-500 p-2 text-slate-800 select-none">Toggle Border</div>

    <div id="hover-area" class="size-30 rounded-md m-3 border-2 border-slate-500 p-2 text-slate-800 select-none">Hover Area</div>

    <input type="text" id="name-input" placeholder="Type Anything" class="border-2 border-slate-500 p-2 rounded-sm">
    <input type="search" id="search-input" placeholder="Search Anything" class="border-2 border-slate-500 p-2 rounded-sm">
    <input type="email" id="email" placeholder="Enter an email" class="border-2 border-slate-500 p-2 rounded-sm">
    <p id="emailmsg"></p>

    <select name="" id="country" class="border-2 border-slate-600 p-2 rounded-sm my-2 px-4">
        <option value="india">India</option>
        <option value="japan">Japan</option>
        <option value="norway">Norway</option>
        <option value="finland">Finland</option>
    </select>

    <script>
        // 1
        const title = document.getElementById('title');
        console.log(title.textContent);

        // 2
        const description = document.getElementById('description');
        description.textContent = "Hello, DOM!"

        // 3
        const counter = document.getElementById('counter');
        counter.textContent = 0;

        // 4
        const greeting = document.getElementById('greeting');
        setInterval(() => {
            const currentTime = new Date();
            greeting.textContent = currentTime.toLocaleTimeString();
        }, 1000);


        // 5
        const userName = "Baka";
        const userNameDisplay = document.getElementById('username-display');
        userNameDisplay.textContent = userName;

        // 6
        const isOnline = false;
        const statusText = isOnline ? "Online" : "Offline";
        const status = document.getElementById('status');
        status.textContent = statusText;

        // 7
        const price = document.getElementById('price');
        const priceText = 50.25;
        price.textContent = `$${priceText}`

        // 8
        const notificationCount = document.getElementById('nCount');
        let nCount = parseInt(notificationCount.textContent);
        
        function notifyCount(){
            return notificationCount.textContent = nCount++;
        }
        
        notifyCount();
        notifyCount();
        notifyCount();
        

        // 9
        const errorMessage = document.getElementById('error-message');
        errorMessage.textContent = "";

        // 10
        const score = document.getElementById('score');
        const result = 12 + 20;
        score.textContent = result;

        // 11
        const welcome = document.getElementById('welcome');
        const firstName = "Baka";
        const lastName = "Onkmade"
        welcome.textContent = `Welcome ${firstName} ${lastName}`;

        // 13
        const loading = document.getElementById('loading');
        setTimeout(() => {
            loading.textContent = "DONE!";
        }, 2000);

        // 14
        const items = ["apple", "banana", "kiwi", "orange", "Strawberry"];
        const badge = document.getElementById('badge');

        badge.textContent = items.length;



        // EVENTS FUNDAMENTALS =============
        // 16
        const clickBtn = document.getElementById('click-btn');
        clickBtn.addEventListener('click', ()=> {
            console.log("Clicked");
        });


        // 17
        const colorBtn = document.getElementById('color-btn');
        colorBtn.addEventListener('click', () => {
            document.body.style.backgroundColor = "#accefc"
        })

        // 18
        const box = document.getElementById('box');

        box.addEventListener('dblclick', ()=> {
            if (box.style.borderColor === "rgb(33, 54, 58)" || box.style.borderColor === "#21363a") {
                box.style.borderColor = "";
            } else {
                box.style.borderColor = "#21363a"; // Set custom color
            }
        });


        // 19
        const hoverArea = document.getElementById('hover-area');
        const hoverAreaText = hoverArea.textContent;
        hoverArea.addEventListener('mouseenter', () => {
            hoverArea.textContent = "Hovering!!"
        });

        // 20
        hoverArea.addEventListener('mouseleave', () => {
            hoverArea.textContent = hoverAreaText;
        });

        // 21 - keydown
        document.addEventListener('keydown', (e) => {
            console.log(e.key);
            // learn the concept of event object and their properties later
        });

        // 22
        const nameInput = document.getElementById('name-input');
        nameInput.addEventListener('keydown', (e) => {
            if(e.key === "e"){
                e.preventDefault();
                // one of the event object's method
                // it stops the event actions
            }
        });


        // 23
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('keyup', (e) => {
            console.log(searchInput.value);
        });

        // 24
        const email = document.getElementById('email');
        const emailmsg = document.getElementById('emailmsg');
        email.addEventListener('input', () => {
            if(email.value.includes("@")){
                emailmsg.textContent = "Valid";
            } else {
                emailmsg.textContent = "Invalid";
            }
        });


        // 25
        const country = document.getElementById('country');
        country.addEventListener('input', (e) => {
            console.log(e.target.value);
        });
    </script>
</body>
</html>
