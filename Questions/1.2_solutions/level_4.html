<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 4: Objects/Classes + DOM</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="mx-auto p-4">

    <div id="profile"></div>
    <div id="total"></div>
    
    <div class="bg-slate-300 w-60 p-2 rounded-md space-y-2 m-2">
        <div id="counter-display" class="bg-white p-2 rounded-sm text-2xl text-slate-800">0</div>
        <div class="flex space-x-1">
            <button id="btn-1" class="grow bg-slate-900 p-2 rounded-sm text-white cursor-pointer">Increment</button>
            <button id="btn-2" class="grow bg-slate-900 p-2 rounded-sm text-white cursor-pointer">Decrement</button>
        </div>
    </div>
    
    <div id="task-output">
    </div>
    <button id="sort-task" class="bg-slate-600 text-white p-2 rounded-sm m-2 cursor-pointer hover:bg-slate-700 transition duration-300 ease-in-out">Sort Task</button>
    

    <script>
        const generateID = () => {
            return "ZIB" + Math.floor(Math.random() * 1000000);
        }

        const user = {
            name: "baka", 
            age: Infinity,
            email: "example@gmail.com",
            id: generateID()
        }

        console.log(user.id)
        const displayContainer = document.getElementById('profile');

        function displayUser(profileData, targetContainer){

            Object.entries(profileData).forEach( ([key, value]) => {
                const paraList = document.createElement('p');
                const formattedKey = key.charAt(0).toUpperCase() + key.slice(1);
                paraList.textContent = `${formattedKey}: ${value}`;
                paraList.classList.add(
                    'bg-slate-400',
                    'p-2',
                    'm-2',
                    'rounded-sm',
                    'text-white', 
                    'w-60'
                );
                
                targetContainer.appendChild(paraList);
            });
        }

        displayUser(user, displayContainer);

        const product = {
            name: "Tablet",
            price: 5.20,
            quantity: 2
        }

        const totalDisplay = document.getElementById('total');

        function getTotalPrice(product, targetContainer){
            const totalPrice = product.price * product.quantity;
            const newElement = document.createElement('p');

            newElement.classList.add(
                'bg-orange-400',
                'p-2',
                'm-2',
                'rounded-sm',
                'text-white', 
                'w-60'
            )
            newElement.textContent = `$${totalPrice.toFixed(2)}`;
            targetContainer.appendChild(newElement);
        };


        getTotalPrice(product, totalDisplay);


        // Challenge 3.3
        // ==========================================
        // MENTAL MODEL: STATE, BEHAVIOR, RENDER
        // ==========================================

        // 1. THE CLASS (THE BLUEPRINT)
        // Think of this as the factory instructions for making a counter machine.
        class Counter {
            
            // STATE (Memory): Runs automatically when a new machine is born.
            constructor() {
                this.count = 0; // Starts the internal memory count at 0
            }

            // BEHAVIOR (Pure Logic): These methods only change the numbers in memory.
            // They do NOT touch the HTML or DOM directly.
            increment() {
                this.count++; // Increases the value of count variable by 1
            }

            decrement() {
                this.count--; // Decreases the value of count variable by 1
            }

            // RENDER (UI Update): This method is the bridge to the screen.
            display(targetContainer) {
                // Step 1: Search for the element object in the DOM using the passed ID string
                const displayElement = document.getElementById(targetContainer);
                
                // Step 2: Guardrail check. If the HTML element is found, update its text
                if (displayElement) {
                    displayElement.textContent = this.count;
                }
                // Step 3: If not found, it safely stops to prevent the app from crashing
            }
        }

        // ==========================================
        // BRINGING IT TO LIFE (WIRING THE DOM)
        // ==========================================

        // Grab the HTML element buttons from the DOM
        const incrementBtn = document.getElementById('btn-1');
        const decrementBtn = document.getElementById('btn-2');

        // INSTANTIATION: Create a living instance from the Counter blueprint
        // This specific 'counter' object now holds its own unique properties and methods in memory
        const counter = new Counter();

        // Set the initial display on the screen when the page first loads
        counter.display('counter-display');
        
        // EVENT LISTENERS: Listen for click events and fire actions sequentially
        // CRITICAL: We use an arrow function wrapper () => { ... } so 'this' inside the 
        // class stays pointed at our 'counter' instance object, not the HTML button!

        incrementBtn.addEventListener('click', () => {
            counter.increment();               // Step 1: Changes the logic state in memory (e.g., 0 becomes 1)
            counter.display('counter-display'); // Step 2: Grabs the new state and updates the text on screen
        });

        decrementBtn.addEventListener('click', () => {
            counter.decrement();               // Step 1: Changes the logic state in memory
            counter.display('counter-display'); // Step 2: Grabs the new state and updates the text on screen
        });
        

        // Challenge 3.4
        class TodoItem{
            constructor(text, completed = false){
                this.text = text;
                this.completed = completed;
            }

            static renderAllItems(todoList, targetContainer){
                const display = document.getElementById(targetContainer);
                const fragment = document.createDocumentFragment();
                
                display.innerHTML = ` `;

                todoList.forEach( task => {
                    const element = document.createElement('p');
                    element.textContent = task.text;

                    element.classList.add(
                        'bg-red-400',
                        'p-2',
                        'm-2',
                        'rounded-sm',
                        'text-white', 
                        'w-60'
                    );

                    if(task.completed){
                        element.classList.add(
                            'text-slate-600',
                            'line-through',
                            'italic',
                            'opacity-50',
                            'bg-slate-400',
                        )

                    }

                    fragment.appendChild(element);
                });

                display.appendChild(fragment);
            }

            static isSorted = false;

            static sortItems(todoList, targetContainer){
                todoList.sort((a, b) => a.completed - b.completed);
                TodoItem.renderAllItems(todoList, targetContainer);

/*              console.log(false - true); // -1 
                console.log(true - true); // 0  
                console.log(true - false); // 1
                console.log(false - false); // 0 */
  
            }
        }

        const todos = [
            new TodoItem("Buy groceries", false),
            new TodoItem("Walk the dog", true),
            new TodoItem("Finish homework", true),
            new TodoItem("Read a book", false),
            new TodoItem("Finish JS Workbook", true),
            new TodoItem("Watch Ippo Makanauchi", false)
        ];

        TodoItem.renderAllItems(todos, 'task-output');

        const sortTaskBtn = document.getElementById('sort-task');
        const originalItems = [...todos];
        // To Toggle the sort back to original, you need to copy the original state before sorting it!
        sortTaskBtn.addEventListener('click', () => {
            if(!TodoItem.isSorted){
                TodoItem.sortItems(todos, 'task-output');
                TodoItem.isSorted = true;
            } else {
                TodoItem.renderAllItems(originalItems, 'task-output');
                TodoItem.isSorted = false;
            }
        });

        /* 
        =================================================================
        Static Keyword: The Method or Field Belong to that Class itself
        =================================================================

        Using static before a method or field means it belongs to the class itself
        rather than to any specific object (instance) created from that class. 
        You don't need to use the new keyword to instantiate the class; you just
        call it directly on the class name (e.g., ClassName.methodName()).
        
        */
    </script>
</body>
</html>
