<!-- 
==========================================
Given an array of objects representing products (name, price, category),
render them as cards. Add a filter dropdown by category that shows only matching cards. 
========================================== 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array of Objects</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="min-h-full bg-[#fcfcfc] min-w-full p-2 space-y-1.5">
    <div class="dropdown" class="relative space-y-1">
        <button id="dropdown-btn" class="bg-[#202833] text-white px-3 py-2 rounded-sm w-40">Select a category</button>
        <div id="dropdown-menu" class="absolute top-13 bg-[#202833] grid w-40 rounded-sm space-y-1 hidden">
            <button data-category="None"            class="px-3 w-full cursor-pointer bg-[#202833] rounded-sm text-left p-1 hover:bg-[#485067] text-white">None</button>
            <button data-category="Electronics"     class="px-3 w-full cursor-pointer bg-[#202833] rounded-sm text-left p-1 hover:bg-[#485067] text-white">Electronics</button>
            <button data-category="Apparel"         class="px-3 w-full cursor-pointer bg-[#202833] rounded-sm text-left p-1 hover:bg-[#485067] text-white">Apparel</button>
            <button data-category="Home Appliances" class="px-3 w-full cursor-pointer bg-[#202833] rounded-sm text-left p-1 hover:bg-[#485067] text-white">Home Appliances</button>
        </div>
    </div>

    <!-- Main -->
    <main id="list" class="bg-[#e5e6fa] p-2 rounded-sm w-full grid grid-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-1"></main>
    <script>
        const products = [
            { 
                name: "Wireless Mouse", 
                price: 29.99, 
                category: "Electronics", 
                img: "https://i.pinimg.com/1200x/2e/37/a7/2e37a721b6d03a521194ca7d5ab85b93.jpg" 
            },
            { 
                name: "Running Shoes", 
                price: 85.00, 
                category: "Apparel", 
                img: "https://i.pinimg.com/736x/6a/0f/b3/6a0fb34a5bf5b08127faadbc1dea26b5.jpg" 
            },
            { 
                name: "Pressure Cooker", 
                price: 49.99, 
                category: "Home Appliances", 
                img: "https://i.pinimg.com/736x/08/90/91/089091b24d31562fe6dc4a53187fa85d.jpg" 
            },
            { 
                name: "Mechanical Keyboard", 
                price: 110.00, 
                category: "Electronics", 
                img: "https://i.pinimg.com/1200x/b7/88/25/b7882560173e889f23321cb24443acad.jpg" 
            }
        ];

        
        const list = document.querySelector('#list');

        function formElement(tag, textContent){
            const element = document.createElement(tag);
            element.textContent = textContent;

            return element;
        }

        function render(arrayToRender){
            list.innerHTML = '';

            arrayToRender.forEach( product => {
                // article - holder of all content
                const article = document.createElement('article');
                article.className = 'bg-white h-fit p-2 rounded-sm grid gap-1'

                // Each Object's data
                const h1 = formElement('h1', product.name);
                h1.className = `text-[#202833] text-xl mb-2`
                h1.dataset.name = product.name;

                const price = formElement('span', `$${product.price}`);
                price.className = 'text-[#202833] bg-[#20283320] px-2 py-1 rounded-sm w-fit'
                price.dataset.price = product.price;
                
                const category = formElement('small', product.category);
                category.className = 'bg-[#fea50010] rounded-sm text-[#fea500] p-1'
                category.dataset.category = product.category;

                const div = document.createElement('div');
                div.className = 'flex justify-between items-center';
                div.append(price, category);


                const img = document.createElement('img');
                img.src = product.img;
                img.className = `rounded-sm object-cover w-70 h-50`;


                article.append(h1, div, img);
                list.appendChild(article);
            });
        }

        const dropdown = document.querySelector('.dropdown');
        const dropdownBtn = document.querySelector('#dropdown-btn');
        const dropdownMenu = document.querySelector('#dropdown-menu');

        dropdown.addEventListener('click', (e) => {

            const click = e.target.closest('#dropdown-btn');
            if(!click) return;
            
            if(click){
                dropdownMenu.classList.toggle('hidden');
                dropdownMenu.addEventListener('click', (e) => {
                    const item = e.target.closest('[data-category]');
                    
                    click.textContent = item.dataset.category;
                    filterCategories(item.textContent);
                    dropdownMenu.classList.add('hidden');
                });
            }
        });

        function filterCategories(category){
            if(category === 'None'){
                render(products);
            } else {
                const filteredItems = products.filter( pro => pro.category === category);
                // returns the shallow copy of products which is filtered;
                render(filteredItems);
            }
        }

        render(products);
    </script>
</body>
</html>
