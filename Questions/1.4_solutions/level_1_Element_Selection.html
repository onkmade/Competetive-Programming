<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practices</title>
    <link rel="stylesheet" href="/src/output.css">
    <style>
        /* How to target an custom data attribute in CSS 

        To target an attribute in CSS (or inside your JavaScript querySelector), 
        you wrap the attribute name and value inside square brackets [ ]

        1. Find any element with that attribute: [data-action]
        2. Find elements with a specific attribute value: [data-action="delete"]

        For example:

        [data-action] - target all the element 
        button[data-action] - target all the button who has data-action as the attribute
        [data-action = "value"] - target elements with specific value
        element[data-action = "value"] - target only element which has specific value assigned
        .class > button[data-action] - CSS syntax to help you!
        
        */
        .toolbar > button[data-action = "delete"]{
            background-color: brown;
            padding: 0.5rem;
            color: white;
            border-radius: 0.35rem;
            width: fit-content;
        }
    </style>
</head>
<body class="p-4 space-y-2">
    <section  id="classId" class="toolbar">
        <button id="something" data-action="save">Save</button>
        <button data-action="delete">Delete</button>
        <button data-action="delete">Trash</button>
        <button data-action="edit">Edit</button>
    </section>

    <!-- 
    Unlike classes and Ids, data-[name] = "value" are the custom attribute!
    
    In the above example: 
    class: standard attribute
    data-action: Custom attribute created by the user
    
    -->
    
    <ul id="items" class="space-y-1">
        <li>Ne Zha</li>
        <li>The Legend of Hei</li>
        <li>Doraemon</li>                  <!-- Target this -->
        <li>Pokemon</li>
        <li>Jujutsu Kaisen</li>
        <li>Ippo Makanauchi</li>           <!-- Target This -->
        <li>Takamora</li>
        <li>Miara</li>
        <li>Sendo The Rocky</li>           <!-- Target This -->
    </ul>

    <br> <p>Challenge 4</p>
    <section class="checking list-none space-y-2">
        <li class="active">Baka</li>
        <li class="highlight">Sendo</li>
        <li class="active highlight">Ippo</li>
        <li class="highlight">Esmo</li>
        <li class="active highlight">CornPotato</li>
        <li class="active">Takamora</li>
        <li class="highlight">Ne Zha</li>
    </section>


    <script>
        const blueText = (element) => {
            element.classList.add(
                'bg-blue-400',
                'w-60', 
                'p-2',
                'rounded-sm',
            );
        }
        /* 
        We've seen how CSS target the data-attributes, let's see how JS target them

        1. getAttribute(element);
        2. element.dataset.nameofdata

        Both are same!
        ------------------
        document method querySelectorAll returns the nodeList of buttons, 
        we can target the custom data attribute similar to how we were targetting them in CSS

        element.querySelectorAll('HTMLtag[data-attribute = 'valua']');
        */

        const toolBar = document.querySelector('.toolbar');
        console.log(toolBar.querySelector('button[data-action = "save"]').id);
        const buttons = toolBar.querySelectorAll('button[data-action="delete"]');

        console.log(buttons.length);


        // Challenge 3 -----------------------------------------------------
        const listItems = document.querySelector('#items');
        listItems.querySelectorAll('li:nth-last-child(2)').forEach(btn => blueText(btn));
        // nth- : allow you to create a mathematical pattern to select elements

        // Challenge 4 -----------------------------------------------------
        const checking = document.querySelector('.checking');
        checking.querySelectorAll('li:is(.active):not(.highlight)').forEach( list => blueText(list));

    </script>
</body>
</html>
