<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEV_OS v3.7 — Portfolio Terminal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#00ff41;--cyan:#00eeff;--red:#ff0055;--amber:#ffb700;
  --dim:#0a0a0a;--panel:#0d1117;--border:#1a2a1a;
  --text-dim:#4a7c4a;--text-mid:#7aaf7a;--text-bright:#b8ffb8;
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none}
#cursor{position:fixed;width:20px;height:20px;pointer-events:none;z-index:9999;transition:transform 0.1s}
#cursor::before{content:'';position:absolute;top:50%;left:50%;width:6px;height:6px;background:var(--cyan);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--cyan),0 0 20px var(--cyan)}
#cursor::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;border:1px solid var(--cyan);border-radius:50%;transform:translate(-50%,-50%);opacity:0.4;animation:cursorPulse 2s infinite}
@keyframes cursorPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.5);opacity:0.1}}
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px)}
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9997;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.7) 100%)}
#glitch-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9996;opacity:0}
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#boot-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:8000;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Share Tech Mono',monospace}
#boot-log{width:700px;max-width:95vw;font-size:13px;color:var(--green);line-height:1.8}
.boot-line{opacity:0;transform:translateX(-10px)}
.boot-ok{color:var(--cyan)}
.boot-warn{color:var(--amber)}
#boot-logo{font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,52px);font-weight:900;color:var(--green);text-shadow:0 0 30px var(--green),0 0 60px var(--green);margin-bottom:40px;letter-spacing:8px;opacity:0}
#main-ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:none;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.8);backdrop-filter:blur(10px)}
#topbar-left{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--cyan);letter-spacing:3px}
#topbar-right{display:flex;gap:20px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim)}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green);margin-right:6px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
#workspace{flex:1;display:flex;overflow:hidden;position:relative}
#terminal-panel{width:500px;min-width:300px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:rgba(0,3,0,0.85);backdrop-filter:blur(5px)}
#terminal-output{flex:1;overflow-y:auto;padding:16px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text-bright);line-height:1.7;scroll-behavior:smooth}
#terminal-output::-webkit-scrollbar{width:3px}
#terminal-output::-webkit-scrollbar-track{background:transparent}
#terminal-output::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}
#input-area{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:rgba(0,5,0,0.9)}
#prompt-label{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:13px;white-space:nowrap}
#cmd-input{flex:1;background:transparent;border:none;outline:none;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);caret-color:var(--green)}
#cmd-input::placeholder{color:var(--text-dim)}
#autocomplete{position:absolute;bottom:48px;left:16px;background:rgba(0,15,0,0.95);border:1px solid var(--green);border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-bright);z-index:200;display:none;min-width:200px}
.ac-item{padding:6px 12px;cursor:pointer;transition:background 0.1s}
.ac-item:hover,.ac-item.active{background:rgba(0,255,65,0.1);color:var(--green)}
#content-panel{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#section-display{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;opacity:0}
.section-content{width:100%;height:100%;overflow-y:auto;padding:40px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.section-content::-webkit-scrollbar{width:3px}
.section-content::-webkit-scrollbar-thumb{background:var(--green)}
.holo-panel{background:rgba(0,20,0,0.6);border:1px solid rgba(0,255,65,0.2);border-radius:4px;padding:24px;margin:12px 0;position:relative;overflow:hidden;width:100%;max-width:800px}
.holo-panel::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,65,0.03),transparent);animation:holoPan 4s infinite}
@keyframes holoPan{0%{left:-100%}100%{left:200%}}
.sec-title{font-family:'Orbitron',sans-serif;font-size:clamp(18px,3vw,32px);color:var(--cyan);letter-spacing:4px;margin-bottom:8px;text-shadow:0 0 20px var(--cyan)}
.sec-sub{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:2px;margin-bottom:32px}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,255,65,0.05);font-family:'Share Tech Mono',monospace;font-size:13px}
.data-label{color:var(--text-dim)}
.data-value{color:var(--green)}
.tag{display:inline-block;padding:3px 10px;border:1px solid rgba(0,255,65,0.3);border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);margin:3px}
.cmd-ref{display:inline-block;background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);padding:2px 8px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--amber)}
.progress-bar{height:4px;background:rgba(0,255,65,0.1);border-radius:2px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:2px;transition:width 1s ease}
#neural-canvas{width:100%;height:100%;position:absolute;top:0;left:0}
#galaxy-canvas{width:100%;height:100%;position:absolute;top:0;left:0}
.project-node{position:absolute;transform:translate(-50%,-50%);cursor:pointer}
.node-core{width:80px;height:80px;border-radius:50%;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);text-align:center;background:rgba(0,40,60,0.8);transition:all 0.3s;position:relative}
.node-core::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(0,238,255,0.2);animation:nodeOrbit 3s linear infinite}
@keyframes nodeOrbit{to{transform:rotate(360deg)}}
.node-core:hover{background:rgba(0,80,120,0.9);box-shadow:0 0 20px var(--cyan);transform:scale(1.1)}
.node-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-mid)}
.skill-node{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:9px;color:#000;font-weight:bold;cursor:pointer;transition:all 0.3s;text-align:center;padding:4px}
.achievement-card{border:1px solid rgba(255,183,0,0.3);background:rgba(20,15,0,0.7);border-radius:4px;padding:16px;margin:8px 0;display:flex;gap:16px;align-items:center;width:100%;max-width:700px;font-family:'Share Tech Mono',monospace}
.ach-icon{font-size:28px;min-width:40px;text-align:center}
.ach-title{color:var(--amber);font-size:13px;margin-bottom:4px}
.ach-desc{color:var(--text-dim);font-size:11px}
.memory-fragment{border:1px solid rgba(0,255,65,0.15);background:rgba(0,10,0,0.8);border-radius:4px;padding:20px;margin:10px 0;width:100%;max-width:700px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-mid);line-height:1.8;position:relative}
.memory-fragment::before{content:attr(data-year);position:absolute;top:-10px;left:16px;background:#000;padding:0 8px;color:var(--cyan);font-size:10px;letter-spacing:2px}
.glitch-text{animation:glitch 0.3s infinite}
@keyframes glitch{0%,100%{text-shadow:none}33%{text-shadow:-2px 0 var(--red),2px 0 var(--cyan)}66%{text-shadow:2px 0 var(--red),-2px 0 var(--cyan)}}
.matrix-rain{position:absolute;top:0;left:0;width:100%;height:100%;z-index:50}
#void-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.hud-corner{position:absolute;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px}
.hud-tl{top:16px;left:20px}
.hud-tr{top:16px;right:20px;text-align:right}
.hud-bl{bottom:16px;left:20px}
.hud-br{bottom:16px;right:20px;text-align:right}
.typing-cursor{display:inline-block;width:8px;height:14px;background:var(--green);vertical-align:middle;animation:blink 1s infinite}
.output-line{margin:2px 0}
.output-cmd{color:var(--amber)}
.output-info{color:var(--text-mid)}
.output-success{color:var(--green)}
.output-error{color:var(--red)}
.output-special{color:var(--cyan)}
.ascii-art{color:var(--green);white-space:pre;font-size:clamp(7px,1vw,12px);line-height:1.2;font-family:'VT323',monospace}
.crt-flicker{animation:crtFlicker 8s infinite}
@keyframes crtFlicker{0%,97%,99%{opacity:1}98%{opacity:0.95}}
.rpg-stat{display:flex;align-items:center;gap:12px;margin:6px 0;font-family:'Share Tech Mono',monospace}
.rpg-name{color:var(--text-dim);width:120px;font-size:12px}
.rpg-bar{flex:1;height:8px;background:rgba(0,255,65,0.1);border-radius:1px;overflow:hidden}
.rpg-fill{height:100%;border-radius:1px;transition:width 1.5s cubic-bezier(0.23,1,0.32,1)}
.rpg-val{color:var(--amber);font-size:11px;width:40px;text-align:right}
#minimap{position:absolute;bottom:80px;right:20px;width:120px;height:80px;border:1px solid var(--border);background:rgba(0,0,0,0.7);font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text-dim);padding:6px;z-index:150}
#minimap-title{color:var(--cyan);font-size:8px;margin-bottom:4px;letter-spacing:1px}
.mini-node{display:flex;align-items:center;gap:4px;margin:2px 0}
.mini-dot{width:4px;height:4px;border-radius:50%;background:var(--text-dim)}
.mini-dot.active{background:var(--green);box-shadow:0 0 4px var(--green)}
#contact-console{width:100%;max-width:700px;font-family:'Share Tech Mono',monospace}
.console-field{margin:12px 0}
.console-label{color:var(--cyan);font-size:12px;margin-bottom:4px;letter-spacing:1px}
.console-input{width:100%;background:rgba(0,20,0,0.5);border:1px solid rgba(0,255,65,0.2);border-radius:2px;padding:10px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);outline:none;transition:border-color 0.3s}
.console-input:focus{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,238,255,0.2)}
.console-btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:12px;letter-spacing:2px;padding:10px 24px;cursor:pointer;transition:all 0.3s;margin-top:8px}
.console-btn:hover{background:var(--cyan);color:#000;box-shadow:0 0 20px var(--cyan)}
#secret-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:5000;display:none;align-items:center;justify-content:center;flex-direction:column;font-family:'Share Tech Mono',monospace}
.secret-code{font-family:'Orbitron',sans-serif;font-size:clamp(40px,8vw,100px);color:var(--red);font-weight:900;text-shadow:0 0 40px var(--red),0 0 80px var(--red);animation:glitch 0.2s infinite;letter-spacing:8px}
textarea.console-input{height:100px;resize:none}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="glitch-overlay"></div>
<canvas id="three-canvas"></canvas>

<!-- BOOT SCREEN -->
<div id="boot-screen">
  <div id="boot-logo">DEV_OS</div>
  <div id="boot-log"></div>
</div>

<!-- SECRET OVERLAY -->
<div id="secret-overlay">
  <div class="secret-code" id="secret-code-text">ACCESS GRANTED</div>
  <div style="color:var(--amber);font-family:'Share Tech Mono',monospace;font-size:14px;margin-top:20px;text-align:center" id="secret-msg"></div>
  <button class="console-btn" style="margin-top:30px" onclick="closeSecret()">[ CLOSE ]</button>
</div>

<!-- MAIN UI -->
<div id="main-ui">
  <div id="topbar">
    <div id="topbar-left">DEV_OS v3.7 &nbsp;|&nbsp; <span class="status-dot"></span>ONLINE &nbsp;|&nbsp; KERNEL: NEXUS-7</div>
    <div id="topbar-right">
      <span id="clock">00:00:00</span>
      <span>CPU: <span id="cpu-val" style="color:var(--green)">23%</span></span>
      <span>RAM: <span id="ram-val" style="color:var(--amber)">4.2GB</span></span>
      <span>NET: <span style="color:var(--cyan)">↑ UPLINK</span></span>
    </div>
  </div>

  <div id="workspace">
    <!-- TERMINAL PANEL -->
    <div id="terminal-panel">
      <div id="terminal-output"></div>
      <div style="position:relative">
        <div id="autocomplete"></div>
        <div id="input-area">
          <span id="prompt-label">root@devos:~$</span>
          <input type="text" id="cmd-input" placeholder="type 'help' to begin..." autocomplete="off" spellcheck="false">
        </div>
      </div>
    </div>

    <!-- CONTENT PANEL -->
    <div id="content-panel">
      <div class="hud-corner hud-tl" id="hud-section">// SYSTEM IDLE</div>
      <div class="hud-corner hud-tr" id="hud-coords">X:0000 Y:0000</div>
      <div class="hud-corner hud-bl">RENDER: THREE.JS v128 + GSAP 3.12</div>
      <div class="hud-corner hud-br" id="hud-fps">FPS: 60</div>
      <div id="section-display"></div>

      <!-- MINIMAP -->
      <div id="minimap">
        <div id="minimap-title">// NAVMAP</div>
        <div class="mini-node"><div class="mini-dot active" id="mm-home"></div><span>HOME</span></div>
        <div class="mini-node"><div class="mini-dot" id="mm-about"></div><span>ABOUT</span></div>
        <div class="mini-node"><div class="mini-dot" id="mm-projects"></div><span>PROJECTS</span></div>
        <div class="mini-node"><div class="mini-dot" id="mm-skills"></div><span>SKILLS</span></div>
        <div class="mini-node"><div class="mini-dot" id="mm-contact"></div><span>CONTACT</span></div>
      </div>
    </div>
  </div>
</div>

<script>
// ========================
// STATE
// ========================
const state = {
  currentSection: 'home',
  cmdHistory: [],
  histIdx: -1,
  acIndex: -1,
  booted: false,
  achievements: [],
  secretsFound: 0,
  matrixActive: false,
  theme: 'green',
  fps: 60,
  lastFrame: performance.now()
};

const COMMANDS = ['help','about','projects','skills','experience','contact','resume','blogs','socials','achievements','clear','theme','matrix','hack','inspect','boot','launch','system-status','visualize skills','enter void','play memory','unlock secret','easter','whoami','ls','cat readme','ping','sudo','neofetch','history','exit'];

// ========================
// CURSOR
// ========================
const cursor = document.getElementById('cursor');
let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;document.getElementById('hud-coords').textContent=`X:${String(Math.round(e.clientX)).padStart(4,'0')} Y:${String(Math.round(e.clientY)).padStart(4,'0')}`});
(function animateCursor(){cx+=(mx-cx)*0.15;cy+=(my-cy)*0.15;cursor.style.left=cx-10+'px';cursor.style.top=cy-10+'px';requestAnimationFrame(animateCursor)})();

// ========================
// THREE.JS BACKGROUND
// ========================
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('three-canvas'),antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.z=50;
const starGeo=new THREE.BufferGeometry();
const stars=12000;
const starPos=new Float32Array(stars*3);
for(let i=0;i<stars*3;i++)starPos[i]=(Math.random()-0.5)*400;
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
const starMat=new THREE.PointsMaterial({color:0x00ff41,size:0.15,transparent:true,opacity:0.6});
const starField=new THREE.Points(starGeo,starMat);
scene.add(starField);
// Grid plane
const gridHelper=new THREE.GridHelper(200,40,0x001a00,0x001a00);
gridHelper.position.y=-20;
scene.add(gridHelper);
// Floating geometry
const group=new THREE.Group();
const geo1=new THREE.IcosahedronGeometry(3,1);
const mat1=new THREE.MeshBasicMaterial({color:0x00eeff,wireframe:true,transparent:true,opacity:0.15});
const mesh1=new THREE.Mesh(geo1,mat1);
mesh1.position.set(30,-5,10);
group.add(mesh1);
const geo2=new THREE.OctahedronGeometry(2);
const mat2=new THREE.MeshBasicMaterial({color:0x00ff41,wireframe:true,transparent:true,opacity:0.12});
const mesh2=new THREE.Mesh(geo2,mat2);
mesh2.position.set(-35,8,-5);
group.add(mesh2);
const geo3=new THREE.TorusGeometry(4,0.5,8,30);
const mat3=new THREE.MeshBasicMaterial({color:0xffb700,wireframe:true,transparent:true,opacity:0.08});
const mesh3=new THREE.Mesh(geo3,mat3);
mesh3.position.set(0,15,-30);
group.add(mesh3);
scene.add(group);
let camAngle=0;
function renderLoop(){
  requestAnimationFrame(renderLoop);
  const now=performance.now();
  const dt=(now-state.lastFrame)/1000;
  state.lastFrame=now;
  state.fps=Math.round(1/dt);
  document.getElementById('hud-fps').textContent=`FPS: ${state.fps}`;
  starField.rotation.y+=0.0001;
  mesh1.rotation.x+=0.003;mesh1.rotation.y+=0.005;
  mesh2.rotation.x-=0.004;mesh2.rotation.z+=0.003;
  mesh3.rotation.x+=0.002;mesh3.rotation.y+=0.001;
  camAngle+=0.0003;
  camera.position.x=Math.sin(camAngle)*5;
  camera.position.y=Math.cos(camAngle*0.7)*3;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
renderLoop();
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ========================
// CLOCK & FAKE STATS
// ========================
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  document.getElementById('cpu-val').textContent=Math.round(15+Math.random()*25)+'%';
  document.getElementById('ram-val').textContent=(3.8+Math.random()*1.2).toFixed(1)+'GB';
}
setInterval(updateClock,1000);
updateClock();

// ========================
// BOOT SEQUENCE
// ========================
const bootLines=[
  {t:'INITIALIZING DEV_OS v3.7...',c:''},
  {t:'[OK] Loading kernel modules',c:'ok'},
  {t:'[OK] Mounting filesystem: /dev/portfolio',c:'ok'},
  {t:'[OK] Starting three.js renderer',c:'ok'},
  {t:'[WARN] Detected excessive creativity in memory banks',c:'warn'},
  {t:'[OK] Neural interface calibrated',c:'ok'},
  {t:'[OK] Loading project database (7 entries found)',c:'ok'},
  {t:'[OK] Skills matrix initialized',c:'ok'},
  {t:'[OK] Achievement system online',c:'ok'},
  {t:'[WARN] Existential risk module disabled (not needed today)',c:'warn'},
  {t:'[OK] AI companion AIDEN activated',c:'ok'},
  {t:'[OK] Glitch engine: armed',c:'ok'},
  {t:'[OK] Reality distortion field: nominal',c:'ok'},
  {t:'════════════════════════════════',c:''},
  {t:'SYSTEM READY. Welcome, visitor.',c:'ok'},
];
async function runBoot(){
  const logo=document.getElementById('boot-logo');
  const log=document.getElementById('boot-log');
  await sleep(200);
  gsap.to(logo,{opacity:1,duration:1,ease:'power2.out'});
  await sleep(1200);
  for(const line of bootLines){
    const el=document.createElement('div');
    el.className='boot-line';
    el.style.color=line.c==='ok'?'var(--cyan)':line.c==='warn'?'var(--amber)':'var(--green)';
    el.textContent=line.t;
    log.appendChild(el);
    gsap.to(el,{opacity:1,x:0,duration:0.3});
    await sleep(80+Math.random()*80);
  }
  await sleep(600);
  gsap.to('#boot-screen',{opacity:0,duration:0.8,onComplete:()=>{
    document.getElementById('boot-screen').style.display='none';
    document.getElementById('main-ui').style.display='flex';

// ========================
// COMMAND HANDLER
// ========================
const input=document.getElementById('cmd-input');
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const cmd=input.value.trim().toLowerCase();
    if(cmd){
      state.cmdHistory.unshift(cmd);
      state.histIdx=-1;
      printCmd(cmd);
      handleCommand(cmd);
      input.value='';
      hideAutoComplete();
    }
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(state.histIdx<state.cmdHistory.length-1){state.histIdx++;input.value=state.cmdHistory[state.histIdx]}
  } else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(state.histIdx>0){state.histIdx--;input.value=state.cmdHistory[state.histIdx]}
    else{state.histIdx=-1;input.value=''}
  } else if(e.key==='Tab'){
    e.preventDefault();
    tabComplete();
  } else if(e.key==='Escape'){
    hideAutoComplete();
  }
});
input.addEventListener('input',()=>{
  const v=input.value.trim().toLowerCase();
  if(v.length>0)showAutoComplete(v);
  else hideAutoComplete();
});
document.addEventListener('keydown',e=>{
  if(e.target!==input && !e.ctrlKey && !e.metaKey && e.key.length===1){
    input.focus();
  }
});
function showAutoComplete(val){
  const matches=COMMANDS.filter(c=>c.startsWith(val) && c!==val);
  if(!matches.length){hideAutoComplete();return}
  const ac=document.getElementById('autocomplete');
  ac.innerHTML='';
  matches.slice(0,6).forEach((m,i)=>{
    const d=document.createElement('div');
    d.className='ac-item';
    d.textContent=m;
    d.addEventListener('click',()=>{input.value=m;input.focus();hideAutoComplete()});
    ac.appendChild(d);
  });
  ac.style.display='block';
  state.acIndex=-1;
}
function hideAutoComplete(){document.getElementById('autocomplete').style.display='none'}
function tabComplete(){
  const v=input.value.trim().toLowerCase();
  const matches=COMMANDS.filter(c=>c.startsWith(v));
  if(matches.length===1)input.value=matches[0];
}
async function handleCommand(cmd){
  await sleep(50);
  const sections={about:showAbout,projects:showProjects,skills:showSkills,experience:showExperience,contact:showContact,resume:showResume,blogs:showBlogs,socials:showSocials,achievements:showAchievements};
  if(sections[cmd]){sections[cmd]();return}
  switch(cmd){
    case 'help':showHelp();break;
    case 'clear':clearTerminal();break;
    case 'matrix':toggleMatrix();break;
    case 'hack':runHack();break;
    case 'system-status':showSystemStatus();break;
    case 'visualize skills':showSkills();break;
    case 'enter void':enterVoid();break;
    case 'play memory':showMemory();break;
    case 'unlock secret':unlockSecret('KONAMI_SEQUENCE','You found the hidden easter egg. The void stares back.🌑');break;
    case 'easter':unlockSecret('EASTER_EGG','🐣 Congratulations. You found the Easter Egg. +100 XP awarded.');break;
    case 'neofetch':showNeofetch();break;
    case 'whoami':typeOut('AIDEN: You are a curious human. Classification: DEVELOPER. Threat level: LOW. Creativity level: HIGH.','output-special');break;
    case 'ls':print('<span class="output-info">about/  projects/  skills/  experience/  contact/  resume/  blogs/  socials/  .secrets/  .void/</span>');break;
    case 'cat readme':showReadme();break;
    case 'ping':print('<span class="output-success">PING portfolio.dev: 64 bytes, time=0.7ms TTL=128</span>');break;
    case 'sudo':print('<span class="output-error">Nice try. Root access denied. This is my sandbox. 😏</span>');break;
    case 'history':state.cmdHistory.forEach((c,i)=>print(`<span class="output-info">${String(i+1).padStart(3,' ')}  ${c}</span>`));break;
    case 'theme':cycleTheme();break;
    case 'inspect':showInspect();break;
    case 'boot':showBoot();break;
    case 'launch':showLaunch();break;
    case 'exit':runExit();break;
    default:
      await sleep(100);
      const responses=[
        `Command not found: <span class="output-error">${cmd}</span>. Try <span class="cmd-ref">help</span> for available commands.`,
        `<span class="output-special">AIDEN:</span> I don't recognize "${cmd}". Were you trying to hack me? Cute.`,
        `<span class="output-error">ERROR:</span> "${cmd}" is not in the command registry. Interesting choice though.`,
        `<span class="output-special">AIDEN:</span> "${cmd}" returns null. But your curiosity doesn't. Type <span class="cmd-ref">help</span>.`,
      ];
      print(responses[Math.floor(Math.random()*responses.length)]);
  }
}

  canvas.width=canvas.offsetWidth;

  ctx.lineWidth=1;
  for(let i=0;i<projects.length;i++){
    for(let j=i+1;j<projects.length;j++){

function startVoidEffect(){
  const canvas=document.getElementById('void-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
  const W=canvas.width,H=canvas.height;
  const particles=Array.from({length:200},()=>({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
    size:Math.random()*2+0.5,
    color:`hsl(${120+Math.random()*60},100%,${30+Math.random()*40}%)`
  }));
  let mouseX=W/2,mouseY=H/2;
  canvas.parentElement.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
  });
  let voidActive=true;
  function drawVoid(){
    if(!document.getElementById('void-canvas'))return;
    ctx.fillStyle='rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,W,H);
    particles.forEach(p=>{
      const dx=mouseX-p.x,dy=mouseY-p.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){p.vx-=dx/dist*0.5;p.vy-=dy/dist*0.5}
      p.vx*=0.98;p.vy*=0.98;
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
    });
    requestAnimationFrame(drawVoid);
  }
  drawVoid();
}

// ========================
// KONAMI CODE EASTER EGG
// ========================
const konami=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiIdx=0;
document.addEventListener('keydown',e=>{
  if(e.key===konami[konamiIdx]){
    konamiIdx++;
    if(konamiIdx===konami.length){
      konamiIdx=0;
      unlockSecret('KONAMI_MASTER','↑↑↓↓←→←→BA — You know the code. True gamer energy. +1000 XP 🎮');
    }
  } else konamiIdx=0;
});

// ========================
// MOUSE PARALLAX ON BACKGROUND
// ========================
document.addEventListener('mousemove',e=>{
  const nx=(e.clientX/window.innerWidth-0.5)*2;
  const ny=(e.clientY/window.innerHeight-0.5)*2;
  gsap.to(group.rotation,{x:ny*0.1,y:nx*0.1,duration:2,ease:'power1.out'});
});

window._startTime=Date.now();
runBoot().then(()=>{
  setTimeout(showHomeScreen,100);
});
