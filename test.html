<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OK</title>
    <link rel="stylesheet" href="/src/output.css">
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
</head>
<body class="bg-[#060606] text-[#f7f5f1]">
    <div>
        <header class="relative bg-[#1A1A1A] border border-white/10 m-1 p-1 rounded-md">
            <!-- Image Preview -->
            <div class=" relative w-full">
                <div id="preview" class="w-full h-70 rounded-sm bg-black/90 transition-colors bg-cover bg-center bg-no-repeat">
            </div>

            <!-- name + Icons -->
            <nav class="absolute top-0 left-0 w-full flex items-center space-x-2 justify-between p-2">
                <div class="flex space-x-2 items-center group transition duration-300">
                    <p id="banner-name" class="font-thin">Enter Banner Name</p>
                    <button id="edit-name" class="place-content-center border border-white/20 text-white/50 p-2 rounded-sm size-8 cursor-pointer transition duration-200 group bg-black/30 opacity-0 hidden group-hover:grid group-hover:opacity-100">
                        <i class="ph ph-pencil-simple-line group-hover:text-white/80 group-hover:border-white/80"></i>
                    </button>
                </div>
                <div class="flex space-x-2">
                    <label for="upload-btn" class="grid place-content-center border border-white/20 text-white/50 p-2 rounded-sm size-8 cursor-pointer transition duration-200 group bg-black/30">
                        <input type="file" accept="image/*" id="upload-btn" class="hidden">
                        <i class="ph ph-pencil-simple group-hover:text-white/80 group-hover:border-white/80 "></i>
                    </label>
                    <label for="profile-btn" class="grid place-content-center border border-white/20 text-white/50 p-2 rounded-sm size-8 cursor-pointer transition duration-200 group bg-black/30">
                        <i class="ph ph-user group-hover:text-white/80 group-hover:border-white/80 "></i>
                    </label>
                </div>
            </nav>
        </header>
        <main>

        </main>
        <footer>

        </footer>
    </div>

    <script>
        const preview = document.getElementById('preview');
        const uploadBtn = document.getElementById('upload-btn');

        const savedImage = localStorage.getItem('bannerImage');

        if(savedImage){
            preview.style.backgroundImage = `url(${savedImage})`;
        }
        uploadBtn.addEventListener('change', (event) => {
            const file = event.target.files[0];
            const reader = new FileReader();

            if(!file) return `Fuck Man`;

            if(file && file.type.startsWith('image/')){

                reader.addEventListener('load', (e) => {
                    const base64String = e.target.result;
                    preview.style.backgroundImage = `url(${base64String})`;

                    localStorage.setItem('bannerImage', base64String);
                });

                reader.readAsDataURL(file);
            }
        });

        const changeName = (targetElement, targetButton) => {
            const element = document.getElementById(targetElement);
            const btn = document.getElementById(targetButton);
            const savedText = localStorage.getItem('updatedText');

            if(savedText){
                element.textContent = savedText;
            }
            
            btn.addEventListener('click', () => {
                element.contentEditable = true;
                element.focus();

                const range = document.createRange();
                const textSelection = document.getSelection();

                range.selectNodeContents(element);
                textSelection.removeAllRanges();
                textSelection.addRange(range);
            });
            

            element.addEventListener('blur', () => {
                element.contentEditable = false;

                const updatedText = element.textContent.trim();
                localStorage.setItem('updatedText', updatedText);
            });

            element.addEventListener('keydown', (e) => {
               if(e.key === "Enter"){
                    e.preventDefault();
                    element.blur();
               }
            });
        };

        changeName('banner-name', 'edit-name');
        
    </script>
</body>
</html>
